[workspace]
name = "bio-research-tools"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.12.*"

[pypi-dependencies]
anyio = ">=4.4,<5"
httpx = ">=0.27,<1"
mcp = ">=1.10,<2"
pytest = ">=8.2,<9"
pytest-asyncio = ">=0.23,<2"

[tasks]
pubmed-mcp = "python mcp-servers/pubmed/server.py"
literature-helper = "python .agents/skills/literature-review/scripts/literature_helpers.py"
test = "pytest -q"
check = "python -m compileall -q .agents/skills/literature-review/scripts mcp-servers/pubmed tests"
